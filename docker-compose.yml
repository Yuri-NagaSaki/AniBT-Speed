services:
  app:
    image: ghcr.io/yuri-nagasaki/anibt-speed:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anibt-speed
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - CITRUS_API_URL=${CITRUS_API_URL:-}
      - CITRUS_MEDIAINFO_TOKEN=${CITRUS_MEDIAINFO_TOKEN:-}
      - TZ=Asia/Shanghai
    volumes:
      - ./backend/data:/app/data
      - ./backend/ssh_keys:/app/ssh_keys:ro
    ports:
      - "127.0.0.1:6868:6868"
    restart: unless-stopped

  peerbanhelper:
    image: ghostchu/peerbanhelper:latest
    container_name: anibt-speed-pbh
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "127.0.0.1:9898:9898"
    volumes:
      - ./peerbanhelper/data:/app/data
    restart: unless-stopped

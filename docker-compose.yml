services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anibt-speed-backend
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - TZ=Asia/Shanghai
    volumes:
      - ./backend/data:/app/data
    networks:
      - anibt
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anibt-speed-frontend
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "127.0.0.1:6868:6868"
    depends_on:
      - backend
    networks:
      - anibt
    restart: unless-stopped

  peerbanhelper:
    image: ghostchu/peerbanhelper:latest
    container_name: anibt-speed-pbh
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "127.0.0.1:9898:9898"
    volumes:
      - ./peerbanhelper/data:/app/data
    networks:
      - anibt
    restart: unless-stopped

networks:
  anibt:
    driver: bridge
